name: Release

# 推 v* tag → 自动构建 + 发布到 npm。
# 用法: npm version patch && git push --follow-tags
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 也可在 Actions 页面手动触发

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance(供应链溯源)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
